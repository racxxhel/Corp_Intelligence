<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelCorp Intelligence</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">
                <i class="fa-solid fa-layer-group"></i> Corp<span style="color:#60a5fa"> Intelligence</span>
            </div>

            <div class="search-container">
                <i class="fa-solid fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Search Company (e.g. 'Zyf')..." autocomplete="off">
                <div id="searchResults" class="search-results"></div>
            </div>

            </div>
    </nav>

    <main class="main-layout">

        <!-- DASHBOARD -->
        <section class="dashboard-panel">

            <header class="company-header">
                <h1 id="companyName">Select a Company...</h1>
                <div class="badges">
                    <span class="badge" id="badgeWebsite">
                        <i class="fa-solid fa-globe"></i> --
                    </span>
                    <span class="badge" id="badgeLoc">
                        <i class="fa-solid fa-location-dot"></i> --
                    </span>
                    <span class="badge" id="badgeYearFounded">
                        <i class="fa-solid fa-calendar"></i> --
                    </span>
                    <span class="badge" id="badgeCluster">
                        <i class="fa-solid fa-diagram-project"></i> --
                    </span>
                </div>
            </header>

            <!-- COMPANY DESCRIPTION -->
            <section class="company-description">
                <div class="card">
                    <div class="card glass-panel"> <div class="label">Company Description</div>
                    <div class="description" id="kpiDescription">--</div>
                </div>
            </section>

            <!-- KPI GRID -->
            <section class="kpi-grid">
                <div class="card glass-panel">
                    <div class="label">
                        <i class="fa-solid fa-dollar-sign" style="color:#4ade80; margin-right:5px;"></i> 
                        Annual Revenue
                    </div>
                    <div class="value" id="kpiRevenue">--</div>
                </div>
                
                <div class="card glass-panel">
                    <div class="label"><i class="fa-solid fa-users" style="color:var(--primary)"></i> Total Employees</div>
                    <div class="value" id="kpiEmployees">--</div>
                 </div>

                <div class="card glass-panel">
                    <div class="label"><i class="fa-solid fa-server" style="color:yellow"></i> Est. IT Spend</div>
                    <div class="value" id="kpiIT">--</div>
                </div>

                <div class="card glass-panel">
                    <div class="label"><i class="fa-solid fa-industry" style="color:var(--success)"></i> Industry (SIC)</div>
                    <div class="value" id="kpiSIC" style="font-size:1.2rem; margin-top:5px">--</div>
                 </div>
            </section>

            <!-- CONTENT GRID -->
            <section class="content-flex">

                <div class="card glass-panel chart-section">
                    <div class="card-header">
                        <h3><i class="fa-solid fa-chart-column" style="color:var(--primary)"></i> Performance vs Cluster Avg</h3>
                    </div>
                    <div class="chart-container">    
                        <canvas id="performanceChart"></canvas>
                    </div>
                </div>
                

                <div class="card table-section">
                    <div class="card-header">
                        <h3>
                            <i class="fa-solid fa-link"></i>
                            Similar Companies in the Same Cluster
                        </h3>
                    </div>

                            <!-- metric selector -->
                    <div style="padding: 0 16px 8px;">
                        <label for="metricSelect"><strong>Compare by:</strong></label>
                        <select id="metricSelect" onchange="reloadCompany()">
                            <option value="revenue">Revenue</option>
                            <option value="employees">Employees</option>
                            <option value="it_spend">IT Spend</option>
                            <option value="year_founded">Year Founded</option>
                        </select>
                    </div>

                    <!-- KEY: wrapper enables horizontal scroll on mobile -->
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Company Name</th>
                                    <th id="neighborMetricHeader">Revenue</th>
                                </tr>
                            </thead>
                            <tbody id="neighborTable"></tbody>
                        </table>
                    </div>
                </div>

            </section>
        </section>

        <!-- CHAT -->
        <aside class="chat-panel" id="chatPanel">
            <div class="chat-header">
                <div style="display:flex; align-items:center; gap:10px">
                    <i class="fa-solid fa-robot"></i> AI Strategic Analyst
                </div>

                <button onclick="toggleChat()" style= "background:none; border:none; color:var(--text-muted); font-size:1.5rem; cursor:pointer;">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="chat-window" id="chatContainer">
                <div class="message bot">
                    <p>Ready. Search for a company to begin.</p>
                </div>
            </div>

            <div class="sample-prompts">
                <button class="prompt-btn"
                    onclick="sendQuickPrompt('Is a team of this size typical for a company within this cluster, or are they operating more leanly than their peers?')">
                    Workforce Benchmarking
                </button>

                <button class="prompt-btn"
                    onclick="sendQuickPrompt('Compared to similar firms, is this infrastructure investment considered heavy or light based on their current IT spend?')">
                    Infrastructure Analysis
                </button>

                <button class="prompt-btn"
                    onclick="sendQuickPrompt('How does this company’s corporate family size compare to the cluster average, and what does that suggest about their organizational complexity?')">
                    Corporate Hierarchy
                </button>
            </div>

            <div class="input-area">
                <textarea id="chatInput" placeholder="Ask about risks..." rows="1"></textarea>
                <button class="send-btn" onclick="sendUserMessage()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </aside>

    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    
    <button class="chat-float-btn" onclick="toggleChat()">
        <i class="fa-solid fa-robot"></i>
    </button>

</body>

</html>
